# Promtail — discovers Docker containers and ships their stdout/stderr to Loki.
# Using Docker service discovery (12-factor: apps log to stdout, not files).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # /container-name -> container
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # compose service / project as labels for easy querying
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # stdout vs stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label: logstream
    pipeline_stages:
      # The demo app logs structured JSON; promote its level to a label.
      - match:
          selector: '{service="app"}'
          stages:
            - json:
                expressions:
                  level: level
                  service: service
                  request_id: request_id
                  duration_ms: duration_ms
            - labels:
                level:
