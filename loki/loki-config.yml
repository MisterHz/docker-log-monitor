# Loki single-binary configuration — filesystem storage.
# Single-host happy path: no object store, no clustering, no auth.
# Suitable for one node; the object_store is swapped for S3/MinIO at scale (v6.0).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# TSDB index with the v13 schema (current default for Loki 3.x).
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h   # 7d
  retention_period: 168h             # 7d — enforced by the compactor below

# Compactor handles retention/deletion on the filesystem backend.
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Disable phone-home analytics.
analytics:
  reporting_enabled: false
