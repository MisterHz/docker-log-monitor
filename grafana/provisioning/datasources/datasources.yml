# Grafana datasource provisioning.
# v0.1: Loki only. The URL is env-driven (${LOKI_URL}) so Grafana can point at a
# local Loki today or a remote hub later (hub-and-spoke, v1.0) without edits.
# Prometheus datasource is added in v0.2.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    url: ${LOKI_URL}
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeout: 60
      maxLines: 1000
