# docker-log-monitor — observability stack.
# v0.1 happy path: Loki, Promtail, Grafana and a demo app on a single host.
# This commit adds Loki only; later commits append the rest of the pipeline.

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

volumes:
  loki-data:
